logLevel: info

api: yes
apiAddress: :9997

rtsp: no
rtmp: no
webrtc: no

hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: fmp4
hlsAlwaysRemux: yes
hlsSegmentCount: 5
hlsSegmentDuration: 2s
hlsPartDuration: 500ms
hlsMuxerCloseAfter: 10s

srt: yes
srtAddress: :8890

pathDefaults:
  source: publisher
  overridePublisher: no
  srtPublishPassphrase: jam-v3-publish-passphrase

paths:
  '~^[-A-Za-z0-9_]+$':
    source: publisher
