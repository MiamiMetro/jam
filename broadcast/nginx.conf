events {}

http {
  upstream mediamtx_hls {
    server mediamtx:8888;
  }

  server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
      add_header Cache-Control "no-store" always;
      return 200 "ok\n";
    }

    location / {
      try_files $uri $uri/ =404;
    }

    location ~ ^/hls/([^/]+)/stream\.m3u8$ {
      proxy_pass http://mediamtx_hls/$1/index.m3u8$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_redirect ~^/([^/]+)/index\.m3u8(.*)$ /hls/$1/index.m3u8$2;
      proxy_hide_header Cache-Control;
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      add_header Cache-Control "no-cache, must-revalidate" always;
      add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ ^/hls/([^/]+)/(.+\.m3u8)$ {
      proxy_pass http://mediamtx_hls/$1/$2$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_redirect ~^/([^/]+)/(.*)$ /hls/$1/$2;
      proxy_hide_header Cache-Control;
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      add_header Cache-Control "no-cache, must-revalidate" always;
      add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ ^/hls/([^/]+)/(.+)$ {
      proxy_pass http://mediamtx_hls/$1/$2$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_redirect ~^/([^/]+)/(.*)$ /hls/$1/$2;
      proxy_hide_header Cache-Control;
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      add_header Cache-Control "public, max-age=60, immutable" always;
      add_header Access-Control-Allow-Origin "*" always;
    }

    error_page 404 = @not_found_no_cache;

    location @not_found_no_cache {
      add_header Cache-Control "no-store" always;
      add_header Access-Control-Allow-Origin "*" always;
      return 404;
    }
  }
}
