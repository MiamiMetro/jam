services:
  mediamtx:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      MTX_AUTHMETHOD: http
      MTX_AUTHHTTPADDRESS: ${BROADCAST_AUTH_HTTP_ADDRESS:?Set BROADCAST_AUTH_HTTP_ADDRESS to the Convex /broadcast/auth endpoint}
      MTX_AUTHHTTPEXCLUDE_0_ACTION: api
      MTX_AUTHHTTPEXCLUDE_1_ACTION: read
      MTX_AUTHHTTPEXCLUDE_2_ACTION: playback
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
