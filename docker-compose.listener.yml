services:
  listener-service:
    build:
      context: .
      dockerfile: Dockerfile.listener
    image: jam-listener-stack:local
    container_name: jam-listener-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SFU_HOST: "${SFU_HOST:-host.docker.internal}"
      SFU_PORT: "${SFU_PORT:-9999}"
      HLS_ROOT: /hls
      SEGMENT_DURATION: "${SEGMENT_DURATION:-0.5}"
      PLAYLIST_SIZE: "${PLAYLIST_SIZE:-3}"
      OUTPUT_GAIN: "${OUTPUT_GAIN:-4.0}"
      ALLOW_INSECURE_DEV_JOINS: "${ALLOW_INSECURE_DEV_JOINS:-0}"
      LISTENER_ROOMS: "${LISTENER_ROOMS:-}"
    volumes:
      - type: bind
        source: ${JAM_HLS_ROOT:-/dev/shm/jam-hls}
        target: /hls
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: jam-listener-nginx
    depends_on:
      - listener-service
    ports:
      - "${LISTENER_HTTP_PORT:-8080}:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - type: bind
        source: ${JAM_HLS_ROOT:-/dev/shm/jam-hls}
        target: /usr/share/nginx/hls
        read_only: true
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
